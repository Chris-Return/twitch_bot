name: Run Bot

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 260

    steps:
      - name: Télécharger le repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lancer le script
        env:
          TWITCH_IRC_URL: ${{ secrets.TWITCH_IRC_URL }}
          TWITCH_IRC_PORT: ${{ secrets.TWITCH_IRC_PORT }}
          TWITCH_USERNAME: ${{ secrets.TWITCH_USERNAME }}
          TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py