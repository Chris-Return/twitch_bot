name: Run Script With DB

on:
  workflow_dispatch

jobs:
  run-script-with-db:
    runs-on: ubuntu-latest
    timeout-minutes: 260

    steps:
      - name: Télécharger le repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Télécharger la DB précédente
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sqlite-db

      - name: Décompresser la DB si elle existe
        run: |
          if [ -f bot.db.gz ]; then
            echo "DB compressée trouvée, décompression..."
            gunzip -f bot.db.gz
          fi

      - name: Lancer le script
        env:
          TWITCH_IRC_URL: ${{ secrets.TWITCH_IRC_URL }}
          TWITCH_IRC_PORT: ${{ secrets.TWITCH_IRC_PORT }}
          TWITCH_USERNAME: ${{ secrets.TWITCH_USERNAME }}
          TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
        run: exec python main.py

      - name: Compresser la DB avant upload
        if: always()
        run: gzip -f bot.db

      - name: Sauvegarder la DB compressée
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-db
          path: bot.db.gz
          retention-days: 30